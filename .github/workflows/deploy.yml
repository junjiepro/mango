  #     - name: Health check
  #       run: |
  #         STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.vercel.outputs.url }}/api/health" || echo "000")
  #         if [ "$STATUS" != "200" ]; then
  #           echo "Health check failed with status: $STATUS"
  #           echo "Retrying in 30s..."
  #           sleep 30
  #           STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.vercel.outputs.url }}/api/health" || echo "000")
  #           if [ "$STATUS" != "200" ]; then
  #             echo "Health check failed after retry: $STATUS"
  #             exit 1
  #           fi
  #         fi
  #         echo "Health check passed"

  publish-cli:
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should_deploy == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @mango/shared build

      - name: Build CLI
        run: pnpm --filter @mango/cli build

      - name: Check if version already published
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./apps/cli/package.json').version")
          PUBLISHED=$(npm view @mango/cli@$PACKAGE_VERSION version 2>/dev/null || echo "not-found")
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $PACKAGE_VERSION already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing version $PACKAGE_VERSION"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.version-check.outputs.skip != 'true'
        run: npm publish --access public
        working-directory: apps/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
