name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip database migrations'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  check-ci:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Verify CI status
        id: check
        run: |
          echo "CI passed or manual trigger, proceeding with deployment"
          echo "should_deploy=true" >> $GITHUB_OUTPUT

      - name: Abort if CI failed
        if: >
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion != 'success'
        run: |
          echo "CI workflow failed, aborting deployment"
          exit 1

  deploy-supabase-migrations:
    runs-on: ubuntu-latest
    needs: check-ci
    if: >
      needs.check-ci.outputs.should_deploy == 'true' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_migrations != 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-supabase-functions:
    runs-on: ubuntu-latest
    needs: [check-ci, deploy-supabase-migrations]
    if: always() && needs.check-ci.result == 'success'
    strategy:
      matrix:
        function:
          - extract-learning-rules
          - generate-skill-embedding
          - miniapp-mcp
          - miniapp-scheduler
          - process-agent-message
          - process-task
          - rag-search
          - update-device-url
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy function ${{ matrix.function }}
        run: supabase functions deploy ${{ matrix.function }} --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # deploy-web:
